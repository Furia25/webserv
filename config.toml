
[engine]
max_events = 1024
max_timeout = 50
closing_timeout = 30
read_size = 4096
max_read_limit = 16384

[logging]
level = "DEBUG"
log_file = "log.txt"
tick_interval = 5

# --- Main Website (Port 8080) ---
[[servers]]
host = "0.0.0.0"
service = "8080"
server_name = "website.com"
root = "./www/site"
max_body_size = 10485760

	[servers.errors]
	404 = "./www/errors/404.html"
	500 = "./www/errors/500.html"

	# Static files route
	[[servers.routes]]
	path = "/"
	methods = ["GET"]
	handler = "STATIC"
	root = "./www/site1"
	index = "index.html"
	autoindex = true

	# File upload route
	[[servers.routes]]
	path = "/upload"
	methods = ["POST"]
	handler = "UPLOAD"
	max_body_size = 256
	allowed_extensions = []
	allow_overwrite = false
	upload_store = "./www/site1/uploads"

	# CGI script route
	[[servers.routes]]
	path = "/api"
	methods = ["GET", "POST", "DELETE"]
	handler = "CGI"
	cgi_bin = "./cgi-bin/api_handler.py"
	interpreter = "python3"
	cgi_timeout = 5
	env = {TEST = "", TEST2 = 4}

# --- Admin Panel (Virtual Host on same port) ---
[[servers]]
host = "0.0.0.0"
service = "8080"
server_name = "admin.local"

	[[servers.routes]]
	path = "/"
	methods = ["GET"]
	handler = "STATIC"
	root = "./www/admin"
	index = "admin.html"

# --- Legacy API (Dedicated Port) ---
[[servers]]
host = "127.0.0.1"
service = "2580"
server_name = "localhost"

	[[servers.routes]]
	path = "/"
	methods = ["GET"]
	handler = "CGI"
    cgi_timeout = 5
	cgi_bin = "./cgi-bin/legacy_api"